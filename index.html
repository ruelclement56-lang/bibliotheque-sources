<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliothèque de sources</title>
  <meta name="description" content="Les références, études, livres et contenus qui nourrissent mes analyses.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ================================================
       DESIGN TOKENS
    ================================================ */
    :root {
      --bg:           #F8FAFC;
      --surface:      #FFFFFF;
      --border:       #E5E7EB;
      --border-hover: #CBD5E1;
      --text-1:       #111827;
      --text-2:       #374151;
      --text-3:       #6B7280;
      --text-4:       #9CA3AF;
      --accent:       #2563EB;
      --accent-h:     #1D4ED8;
      --accent-soft:  #EFF6FF;

      --shadow-card:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-hover: 0 8px 28px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
      --shadow-modal: 0 24px 64px rgba(0,0,0,.18), 0 8px 24px rgba(0,0,0,.10);

      --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
      --r-xl: 24px; --r-full: 9999px;

      --t-fast: 150ms ease-out;
      --t-base: 220ms ease-out;
      --t-slow: 320ms ease-out;
    }

    /* ================================================
       RESET
    ================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text-1); line-height: 1.6;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

    /* ================================================
       LAYOUT
    ================================================ */
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ================================================
       HEADER
    ================================================ */
    .site-header { padding: 64px 0 52px; text-align: center; }

    .header-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), #7C3AED);
      border-radius: var(--r-md); margin-bottom: 24px;
      box-shadow: 0 4px 14px rgba(37,99,235,.35);
    }
    .header-mark svg { width: 26px; height: 26px; color: #fff; }

    .site-title {
      font-size: clamp(26px, 5vw, 40px); font-weight: 700;
      letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 14px;
    }
    .site-subtitle {
      font-size: 16px; color: var(--text-3);
      max-width: 460px; margin: 0 auto; line-height: 1.65;
    }
    .header-divider {
      width: 40px; height: 3px;
      background: linear-gradient(90deg, var(--accent), #7C3AED);
      border-radius: 2px; margin: 28px auto 0; opacity: .6;
    }

    /* ================================================
       STICKY CONTROLS
    ================================================ */
    .controls-bar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(248,250,252,.92);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border); padding: 14px 0;
    }
    .controls-inner { display: flex; flex-direction: column; gap: 10px; }

    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 17px; height: 17px; color: var(--text-4); pointer-events: none;
    }
    .search-input {
      width: 100%; height: 42px; padding: 0 16px 0 42px;
      font-size: 14px; color: var(--text-1);
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--r-full); outline: none;
      transition: border-color var(--t-base), box-shadow var(--t-base);
    }
    .search-input::placeholder { color: var(--text-4); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

    .filters-row {
      display: flex; align-items: center; gap: 7px;
      overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 2px;
    }
    .filters-row::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0; height: 32px; padding: 0 13px;
      font-size: 12.5px; font-weight: 500; white-space: nowrap;
      color: var(--text-2); background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--r-full);
      transition: all var(--t-base);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .filter-btn.active { background: var(--text-1); border-color: var(--text-1); color: #fff; }

    /* ================================================
       RESULTS META
    ================================================ */
    .results-meta { display: flex; align-items: center; margin: 28px 0 24px; }
    .results-count { font-size: 13px; font-weight: 500; color: var(--text-3); }
    .results-count strong { font-weight: 600; color: var(--text-1); }

    /* ================================================
       CARDS GRID
    ================================================ */
    .cards-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 22px; margin-bottom: 80px;
    }
    @media (max-width: 1024px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px)  { .cards-grid { grid-template-columns: 1fr; gap: 16px; } }

    /* ================================================
       CARD (1 card = 1 video)
    ================================================ */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      @keyframes cardIn { from { opacity: 0; } to { opacity: 1; } }
    }

    .card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--r-lg); overflow: hidden; cursor: pointer;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-card);
      transition: transform var(--t-base), box-shadow var(--t-base), border-color var(--t-base);
      animation: cardIn 280ms ease-out both;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--border-hover); }
    @media (prefers-reduced-motion: reduce) { .card:hover { transform: none; } }

    .card-img-wrap { position: relative; aspect-ratio: 16/10; overflow: hidden; background: #F3F4F6; }
    .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 380ms ease-out; }
    .card:hover .card-img { transform: scale(1.05); }
    @media (prefers-reduced-motion: reduce) { .card:hover .card-img { transform: none; } }

    /* Sources count pill on image */
    .card-count-pill {
      position: absolute; top: 10px; right: 10px;
      display: inline-flex; align-items: center; gap: 5px;
      height: 24px; padding: 0 10px;
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,.92); background: rgba(0,0,0,.58);
      border-radius: var(--r-full); backdrop-filter: blur(8px);
    }
    .card-count-pill svg { width: 11px; height: 11px; flex-shrink: 0; }

    .card-body { padding: 18px 18px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }

    /* Category badge */
    .cat-badge {
      display: inline-flex; align-items: center;
      height: 21px; padding: 0 9px;
      font-size: 10.5px; font-weight: 600; letter-spacing: .04em;
      border-radius: var(--r-full); border: 1px solid transparent; align-self: flex-start;
    }
    .cat-Psychologie   { background: #FFFBEB; color: #92400E; border-color: #FCD34D; }
    .cat-Marketing     { background: #FEF2F2; color: #991B1B; border-color: #FCA5A5; }
    .cat-Business      { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
    .cat-Sciences      { background: #F5F3FF; color: #5B21B6; border-color: #C4B5FD; }
    .cat-Sport         { background: #ECFDF5; color: #065F46; border-color: #6EE7B7; }
    .cat-Productivite  { background: #ECFEFF; color: #155E75; border-color: #67E8F9; }
    .cat-Reseaux       { background: #FFF7ED; color: #9A3412; border-color: #FDBA74; }
    .cat-Autre         { background: #F9FAFB; color: #374151; border-color: #D1D5DB; }

    .card-title {
      font-size: 15px; font-weight: 600; line-height: 1.4;
      letter-spacing: -.01em; color: var(--text-1);
    }
    .card-desc {
      font-size: 13px; color: var(--text-3); line-height: 1.65; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border); margin-top: auto;
    }
    .card-footer-label { font-size: 12px; font-weight: 500; color: var(--text-4); }

    .card-arrow {
      width: 28px; height: 28px; border-radius: var(--r-full);
      background: var(--bg); border: 1.5px solid var(--border);
      display: inline-flex; align-items: center; justify-content: center;
      transition: all var(--t-base);
    }
    .card-arrow svg {
      width: 13px; height: 13px; color: var(--text-3);
      transition: transform var(--t-base), color var(--t-base);
    }
    .card:hover .card-arrow { background: var(--accent); border-color: var(--accent); }
    .card:hover .card-arrow svg { color: #fff; transform: translate(1px, -1px); }

    /* Empty state */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
    .empty-state svg { width: 52px; height: 52px; margin: 0 auto 18px; color: var(--text-4); }
    .empty-state h3 { font-size: 17px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .empty-state p  { font-size: 14px; color: var(--text-3); }

    /* ================================================
       MODAL
    ================================================ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      background: rgba(0,0,0,.48);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      opacity: 0; visibility: hidden;
      transition: opacity var(--t-slow), visibility var(--t-slow);
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: var(--surface); border-radius: var(--r-xl);
      width: 100%; max-width: 680px; max-height: 90vh;
      overflow-y: auto; box-shadow: var(--shadow-modal);
      transform: translateY(16px) scale(.97);
      transition: transform var(--t-slow);
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    @media (prefers-reduced-motion: reduce) {
      .modal { transform: none; }
      .modal-overlay.open .modal { transform: none; }
    }

    .modal-img-wrap {
      position: relative; aspect-ratio: 16/9;
      background: #F3F4F6; border-radius: var(--r-xl) var(--r-xl) 0 0; overflow: hidden;
    }
    .modal-img { width: 100%; height: 100%; object-fit: cover; }

    .modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 1;
      width: 36px; height: 36px; border-radius: var(--r-full);
      background: rgba(0,0,0,.52); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--t-base), transform var(--t-fast);
    }
    .modal-close:hover { background: rgba(0,0,0,.74); }
    .modal-close:active { transform: scale(.9); }
    .modal-close svg { width: 15px; height: 15px; color: #fff; }

    .modal-body { padding: 26px; }

    .modal-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

    .modal-count-tag {
      display: inline-flex; align-items: center; gap: 5px;
      height: 25px; padding: 0 11px;
      font-size: 10.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      color: var(--text-3); background: var(--bg);
      border: 1.5px solid var(--border); border-radius: var(--r-full);
    }
    .modal-count-tag svg { width: 11px; height: 11px; }

    .modal-title {
      font-size: clamp(18px, 3vw, 22px); font-weight: 700;
      letter-spacing: -.025em; line-height: 1.3; color: var(--text-1); margin-bottom: 10px;
    }
    .modal-context { font-size: 14px; color: var(--text-3); line-height: 1.7; }
    .modal-sep { height: 1px; background: var(--border); margin: 22px 0 18px; }

    .modal-sources-label {
      font-size: 10.5px; font-weight: 600; letter-spacing: .09em;
      text-transform: uppercase; color: var(--text-4); margin-bottom: 14px;
    }

    /* ================================================
       SOURCE ITEMS (inside modal)
    ================================================ */
    .sources-list { display: flex; flex-direction: column; gap: 10px; }

    .source-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 16px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      transition: border-color var(--t-base), background var(--t-base);
    }
    .source-item:hover { border-color: #C7D7FE; background: #F8FAFF; }

    .source-item-content { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }

    .source-item-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .source-type-pill {
      display: inline-flex; align-items: center; gap: 4px;
      height: 20px; padding: 0 8px; flex-shrink: 0;
      font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      color: var(--text-3); background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--r-full);
    }
    .source-type-pill svg { width: 10px; height: 10px; }

    .source-item-title {
      font-size: 13.5px; font-weight: 600; color: var(--text-1); line-height: 1.35;
    }
    .source-item-author {
      font-size: 11.5px; font-weight: 500; color: var(--text-4);
    }
    .source-item-desc {
      font-size: 12.5px; color: var(--text-3); line-height: 1.6;
    }

    .source-item-link {
      flex-shrink: 0; width: 32px; height: 32px;
      border-radius: var(--r-full); border: 1.5px solid var(--border);
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-3); margin-top: 2px;
      transition: all var(--t-base);
    }
    .source-item-link:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .source-item-link:hover svg { transform: translate(1px, -1px); }
    .source-item-link svg { width: 13px; height: 13px; transition: transform var(--t-base); }

    /* ================================================
       FOOTER
    ================================================ */
    .site-footer { padding: 28px 0; border-top: 1px solid var(--border); text-align: center; }
    .site-footer p { font-size: 12.5px; color: var(--text-4); }

    /* ================================================
       RESPONSIVE
    ================================================ */
    @media (max-width: 768px) {
      .site-header { padding: 44px 0 36px; }
      .modal-body { padding: 18px; }
      .modal-title { font-size: 18px; }
    }
    @media (max-width: 480px) { .wrap { padding: 0 16px; } }
  </style>
</head>

<body>

  <!-- ============================================
       HEADER
  ============================================ -->
  <div class="wrap">
    <header class="site-header">
      <div class="header-mark" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <h1 class="site-title">Bibliothèque de sources</h1>
      <p class="site-subtitle">Les références, études, livres et contenus qui nourrissent mes analyses.</p>
      <div class="header-divider" aria-hidden="true"></div>
    </header>
  </div>

  <!-- ============================================
       STICKY CONTROLS
  ============================================ -->
  <div class="controls-bar">
    <div class="wrap">
      <div class="controls-inner">

        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" id="searchInput" class="search-input"
            placeholder="Rechercher une vidéo, un sujet…"
            aria-label="Rechercher" autocomplete="off">
        </div>

        <nav class="filters-row" id="filtersRow" aria-label="Filtres par thématique">
          <button class="filter-btn active" data-filter="Toutes"         aria-pressed="true">Toutes</button>
          <button class="filter-btn"        data-filter="Psychologie"    aria-pressed="false">Psychologie</button>
          <button class="filter-btn"        data-filter="Marketing"      aria-pressed="false">Marketing</button>
          <button class="filter-btn"        data-filter="Business"       aria-pressed="false">Business</button>
          <button class="filter-btn"        data-filter="Sciences"       aria-pressed="false">Sciences</button>
          <button class="filter-btn"        data-filter="Sport"          aria-pressed="false">Sport</button>
          <button class="filter-btn"        data-filter="Réseaux sociaux" aria-pressed="false">Réseaux sociaux</button>
          <button class="filter-btn"        data-filter="Productivité"   aria-pressed="false">Productivité</button>
          <button class="filter-btn"        data-filter="Autre"          aria-pressed="false">Autre</button>
        </nav>

      </div>
    </div>
  </div>

  <!-- ============================================
       MAIN
  ============================================ -->
  <div class="wrap">
    <div class="results-meta">
      <p class="results-count" id="resultsCount" aria-live="polite" aria-atomic="true">
        <strong id="countNum">0</strong> vidéo affichée
      </p>
    </div>
    <main id="cardsGrid" class="cards-grid" aria-label="Liste des vidéos"></main>
  </div>

  <!-- ============================================
       FOOTER
  ============================================ -->
  <footer class="site-footer">
    <div class="wrap">
      <p>Bibliothèque de sources &mdash; Mise à jour régulière</p>
    </div>
  </footer>

  <!-- ============================================
       MODAL
  ============================================ -->
  <div class="modal-overlay" id="modalOverlay"
       role="dialog" aria-modal="true"
       aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal" id="modal">
      <div class="modal-img-wrap">
        <img class="modal-img" id="modalImg" src="" alt="">
        <button class="modal-close" id="modalClose" aria-label="Fermer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-badges" id="modalBadges"></div>
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-context" id="modalContext"></p>
        <div class="modal-sep"></div>
        <p class="modal-sources-label" id="modalSourcesLabel">Sources</p>
        <div class="sources-list" id="sourcesList"></div>
      </div>
    </div>
  </div>


  <script>
    /* ================================================
       ★ DONNÉES — Structure :
       VIDEOS = tableau de vidéos.
       Chaque vidéo a un titre, une catégorie, une image,
       une description courte, et un tableau sources[].
       Chaque source a : author, title, type, description, link.

       Catégories disponibles :
         "Psychologie" | "Marketing" | "Business" |
         "Sciences" | "Sport" | "Réseaux sociaux" |
         "Productivité" | "Autre"

       Types de source :
         "Livre" | "Étude" | "Article" | "Vidéo" | "Podcast" | "Rapport"
    ================================================ */
    const _VIDEOS_DEFAULT = [
      {
        title: "Les 5 biais cognitifs",
        category: "Psychologie",
        image: "https://images.unsplash.com/photo-1559757148-5c350d0d3c56?w=800&auto=format&fit=crop&q=80",
        shortDescription: "Les biais cognitifs ne permettent pas littéralement de « vendre à n'importe qui ». Ils permettent surtout de mieux comprendre comment les humains perçoivent, comparent, jugent et décident.",
        sources: [
          {
            author: "Daniel Kahneman",
            title: "Système 1 / Système 2",
            type: "Étude",
            description: "Distinction entre pensée rapide/intuitive (Système 1) et pensée lente/logique (Système 2). Permet de comprendre pourquoi notre cerveau utilise des raccourcis mentaux dans les décisions d'achat. Prix Nobel d'économie 2002.",
            link: "https://www.nobelprize.org/prizes/economic-sciences/2002/kahneman/facts/"
          },
          {
            author: "Edward Thorndike",
            title: "Effet de halo",
            type: "Étude",
            description: "Une impression positive sur un aspect influence le jugement global. Si un produit paraît premium, on lui attribue inconsciemment d'autres qualités. Fondement de l'image de marque et du design produit.",
            link: "https://web.mit.edu/curhan/www/docs/Articles/biases/4_J_Applied_Psychology_25_%28Thorndike%29.pdf"
          },
          {
            author: "Amos Tversky & Daniel Kahneman",
            title: "Effet d'ancrage",
            type: "Étude",
            description: "Le premier chiffre exposé biaise tous les jugements suivants, même s'il est arbitraire. Explique le mécanisme des prix barrés et des offres comparatives. Publié dans Science, 1974.",
            link: "https://www.science.org/doi/10.1126/science.185.4157.1124"
          },
          {
            author: "Alvin Gouldner",
            title: "Norme de réciprocité",
            type: "Article",
            description: "Quand on reçoit quelque chose, on ressent une obligation sociale à rendre. Base du content marketing : donner de la valeur avant de vendre renforce la confiance et facilite la conversion.",
            link: "https://www.jstor.org/stable/2092623"
          },
          {
            author: "Henri Tajfel",
            title: "Appartenance sociale & biais d'endogroupe",
            type: "Étude",
            description: "Les humains favorisent leur propre groupe, même créé arbitrairement. Explique pourquoi les marques vendent une identité, un statut et un sentiment d'appartenance autant qu'un produit.",
            link: "https://onlinelibrary.wiley.com/doi/10.1002/ejsp.2420010202"
          },
          {
            author: "Gilovich, Medvec & Savitsky",
            title: "Effet projecteur",
            type: "Étude",
            description: "On surestime l'attention que les autres portent à nos actions et apparences. Explique pourquoi les messages qui touchent une insécurité personnelle créent une forte identification.",
            link: "https://doi.org/10.1037/0022-3514.78.2.211"
          }
        ]
      }
      /* ← Ajoutez vos prochaines vidéos ici, sur le même modèle */
    ];
    /* Charge les données : data.json (serveur) → localStorage → défaut */
    let VIDEOS = [];

    async function loadVideos() {
      try {
        const r = await fetch('./data.json', { cache: 'no-store' });
        if (r.ok) {
          const data = await r.json();
          localStorage.setItem('bib_videos', JSON.stringify(data));
          return data;
        }
      } catch {}
      try {
        const raw = localStorage.getItem('bib_videos');
        if (raw) return JSON.parse(raw);
      } catch {}
      return _VIDEOS_DEFAULT;
    }

    /* ================================================
       ICONS — SVG inline par type de source
    ================================================ */
    const ICONS = {
      "Livre":   `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
      "Étude":   `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
      "Article": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>`,
      "Vidéo":   `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>`,
      "Podcast": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`,
      "Rapport": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
      "_default":`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    };

    const CAT_CLASS = {
      "Psychologie":    "cat-Psychologie",
      "Marketing":      "cat-Marketing",
      "Business":       "cat-Business",
      "Sciences":       "cat-Sciences",
      "Sport":          "cat-Sport",
      "Productivité":   "cat-Productivite",
      "Réseaux sociaux":"cat-Reseaux",
      "Autre":          "cat-Autre",
    };

    /* ================================================
       STATE
    ================================================ */
    let activeFilter = "Toutes";
    let searchQuery  = "";

    /* ================================================
       HELPERS
    ================================================ */
    function icon(type) { return ICONS[type] || ICONS["_default"]; }
    function catCls(cat){ return CAT_CLASS[cat] || "cat-Autre"; }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function filtered() {
      const q = searchQuery.toLowerCase();
      return VIDEOS.filter(v => {
        const matchCat = activeFilter === "Toutes" || v.category === activeFilter;
        if (!matchCat) return false;
        if (!q) return true;
        return (
          v.title.toLowerCase().includes(q) ||
          v.shortDescription.toLowerCase().includes(q) ||
          v.category.toLowerCase().includes(q) ||
          v.sources.some(s =>
            s.title.toLowerCase().includes(q) ||
            s.author.toLowerCase().includes(q)
          )
        );
      });
    }

    /* ================================================
       RENDER VIDEO CARDS
    ================================================ */
    function render() {
      const grid  = document.getElementById("cardsGrid");
      const countN = document.getElementById("countNum");
      const countP = document.getElementById("resultsCount");
      const list  = filtered();
      const n     = list.length;

      countN.textContent = n;
      countP.innerHTML   = `<strong>${n}</strong> vidéo${n > 1 ? "s" : ""} affichée${n > 1 ? "s" : ""}`;

      if (n === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <h3>Aucune vidéo trouvée</h3>
            <p>Essayez un autre filtre ou modifiez votre recherche.</p>
          </div>`;
        return;
      }

      grid.innerHTML = list.map((v, i) => {
        const realIdx = VIDEOS.indexOf(v);
        const srcCount = v.sources.length;
        return `
          <article
            class="card"
            role="button" tabindex="0"
            aria-label="Voir les sources : ${escHtml(v.title)}"
            data-idx="${realIdx}"
            style="animation-delay:${Math.min(i * 60, 240)}ms"
          >
            <div class="card-img-wrap">
              <img class="card-img" src="${v.image}" alt="${escHtml(v.title)}" loading="lazy">
              <span class="card-count-pill" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                ${srcCount} source${srcCount > 1 ? "s" : ""}
              </span>
            </div>
            <div class="card-body">
              <span class="cat-badge ${catCls(v.category)}">${escHtml(v.category)}</span>
              <h2 class="card-title">${escHtml(v.title)}</h2>
              <p class="card-desc">${escHtml(v.shortDescription)}</p>
              <div class="card-footer">
                <span class="card-footer-label">Voir les sources</span>
                <span class="card-arrow" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="7" y1="17" x2="17" y2="7"/>
                    <polyline points="7 7 17 7 17 17"/>
                  </svg>
                </span>
              </div>
            </div>
          </article>`;
      }).join("");

      grid.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click",   () => openModal(+card.dataset.idx));
        card.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openModal(+card.dataset.idx); }
        });
      });
    }

    /* ================================================
       MODAL — shows all sources for a video
    ================================================ */
    let lastFocused = null;

    function openModal(idx) {
      const v = VIDEOS[idx];
      if (!v) return;
      lastFocused = document.activeElement;

      document.getElementById("modalImg").src = v.image;
      document.getElementById("modalImg").alt = v.title;
      document.getElementById("modalTitle").textContent  = v.title;
      document.getElementById("modalContext").textContent = v.shortDescription;

      /* Badges */
      const srcCount = v.sources.length;
      document.getElementById("modalBadges").innerHTML = `
        <span class="cat-badge ${catCls(v.category)}">${escHtml(v.category)}</span>
        <span class="modal-count-tag">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          ${srcCount} source${srcCount > 1 ? "s" : ""}
        </span>`;

      /* Sources label */
      document.getElementById("modalSourcesLabel").textContent =
        `Sources (${srcCount})`;

      /* Sources list */
      document.getElementById("sourcesList").innerHTML = v.sources.map((s, i) => `
        <div class="source-item">
          <div class="source-item-content">
            <div class="source-item-header">
              <span class="source-type-pill">${icon(s.type)}${escHtml(s.type)}</span>
              <span class="source-item-author">${escHtml(s.author)}</span>
            </div>
            <p class="source-item-title">${escHtml(s.title)}</p>
            <p class="source-item-desc">${escHtml(s.description)}</p>
          </div>
          <a class="source-item-link" href="${escHtml(s.link)}"
             target="_blank" rel="noopener noreferrer"
             aria-label="Voir la source : ${escHtml(s.title)}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
      `).join("");

      const overlay = document.getElementById("modalOverlay");
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      document.getElementById("modal").scrollTop = 0;
      setTimeout(() => document.getElementById("modalClose").focus(), 60);
    }

    function closeModal() {
      const overlay = document.getElementById("modalOverlay");
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      if (lastFocused) lastFocused.focus();
    }

    /* ================================================
       EVENTS
    ================================================ */
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll(".filter-btn").forEach(b => {
          b.classList.toggle("active", b === btn);
          b.setAttribute("aria-pressed", String(b === btn));
        });
        render();
      });
    });

    document.getElementById("searchInput").addEventListener("input", e => {
      searchQuery = e.target.value.trim();
      render();
    });

    document.getElementById("modalClose").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("click", e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeModal();
    });

    /* ================================================
       INIT
    ================================================ */
    (async () => {
      VIDEOS = await loadVideos();
      render();
    })();
  </script>

</body>
</html>
